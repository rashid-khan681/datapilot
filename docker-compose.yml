version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: python main.py mcp
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  datapilot-ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: python main.py ui
    ports:
      - "7860:7860"
    environment:
      - PORT=7860
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    restart: unless-stopped
    depends_on:
      mcp-server:
        condition: service_healthy
